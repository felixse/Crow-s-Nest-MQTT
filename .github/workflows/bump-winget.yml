name: Bump Winget Manifest

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Published version to submit (for example, 1.2.3)."
        required: true
        type: string

jobs:
  bump_winget:
    name: Bump Winget Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Trigger winget-pkgs manifest update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.WINGET_PKGS_TOKEN }}
          repository: koepalex/winget-pkgs
          event-type: bump-winget
          client-payload: '{"version": "${{ github.event.release.tag_name || inputs.version }}"}'
