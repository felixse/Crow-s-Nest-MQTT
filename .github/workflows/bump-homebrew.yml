name: Bump Homebrew Cask

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Published version to submit (for example, 1.2.3)."
        required: true
        type: string

jobs:
  bump_homebrew:
    name: Bump Homebrew Cask
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homebrew-crowsnest bump
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: koepalex/homebrew-crowsnest
          event-type: bump-cask
          client-payload: '{"version": "${{ github.event.release.tag_name || inputs.version }}"}'
